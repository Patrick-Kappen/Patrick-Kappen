      <rect y="48" width="94" height="30" rx="15" fill="#3b1d75" stroke="#a371f7"/><text x="18" y="68" fill="#e6d4ff">Langfuse</text>
      <rect x="104" y="48" width="92" height="30" rx="15" fill="#3b1d75" stroke="#a371f7"/><text x="122" y="68" fill="#e6d4ff">Phoenix</text>
