      <rect x="174" width="98" height="30" rx="15" fill="#0d419d" stroke="#1f6feb"/><text x="193" y="20" fill="#c9d1ff">IBM Cloud</text>
      <rect y="48" width="102" height="30" rx="15" fill="#0d419d" stroke="#1f6feb"/><text x="18" y="68" fill="#c9d1ff">Kubernetes</text>
