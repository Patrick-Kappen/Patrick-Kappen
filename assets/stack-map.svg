<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="520" rx="18" fill="#0d1117"/>
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.08"/>
    </pattern>
    <linearGradient id="platform" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1f6feb" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="ai" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#a371f7" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="systems" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3fb950" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0.92"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="520" fill="url(#dots)" opacity="0.5"/>

  <text x="64" y="76" fill="#e6edf3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="800">Active engineering map</text>
  <text x="64" y="110" fill="#8b949e" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="500">A compact view of the systems, tools, and patterns I work with most.</text>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="64" y="150" width="356" height="286" rx="18" fill="url(#platform)" stroke="#30363d"/>
    <rect x="462" y="150" width="356" height="286" rx="18" fill="url(#ai)" stroke="#30363d"/>
    <rect x="860" y="150" width="356" height="286" rx="18" fill="url(#systems)" stroke="#30363d"/>

    <text x="94" y="200" fill="#79c0ff" font-size="22" font-weight="800">Platform Engineering</text>
    <text x="94" y="232" fill="#c9d1d9" font-size="15" font-weight="500">Cloud, datacenter, GitOps, IaC and orchestration.</text>

    <text x="492" y="200" fill="#d2a8ff" font-size="22" font-weight="800">MLOps / AI Systems</text>
    <text x="492" y="232" fill="#c9d1d9" font-size="15" font-weight="500">LLM tooling, observability, retrieval and local models.</text>

    <text x="890" y="200" fill="#56d364" font-size="22" font-weight="800">Reproducible Systems</text>
    <text x="890" y="232" fill="#c9d1d9" font-size="15" font-weight="500">NixOS, homelab, backups, automation and recovery.</text>
