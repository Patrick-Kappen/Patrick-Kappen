      <rect width="82" height="30" rx="15" fill="#113c20" stroke="#3fb950"/><text x="18" y="20" fill="#c8f7d2">NixOS</text>
      <rect x="92" width="94" height="30" rx="15" fill="#113c20" stroke="#3fb950"/><text x="110" y="20" fill="#c8f7d2">TrueNAS</text>
      <rect x="196" width="92" height="30" rx="15" fill="#113c20" stroke="#3fb950"/><text x="214" y="20" fill="#c8f7d2">Proxmox</text>
      <rect y="48" width="98" height="30" rx="15" fill="#113c20" stroke="#3fb950"/><text x="18" y="68" fill="#c8f7d2">10Gbit</text>
